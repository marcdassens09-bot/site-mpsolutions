<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Chatbot IA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f7fb; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #1a6b3c, #2ecc71, #27ae60); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; transition: opacity 0.8s ease, transform 0.8s ease; }
        #splash.hide { opacity: 0; transform: translateY(-100%); pointer-events: none; }
        .ia-robot { font-size: 80px; animation: float 2s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
        .ia-rings { position: relative; width: 120px; height: 120px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; }
        .ring { position: absolute; border-radius: 50%; border: 3px solid rgba(255,255,255,0.4); animation: pulse-ring 2s ease-out infinite; }
        .ring1 { width: 140px; height: 140px; animation-delay: 0s; }
        .ring2 { width: 170px; height: 170px; animation-delay: 0.5s; }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.3); opacity: 0; } }
        .splash-title { color: white; font-size: 28px; font-weight: bold; margin-top: 20px; letter-spacing: 2px; }
        .splash-subtitle { color: rgba(255,255,255,0.8); font-size: 14px; margin-top: 8px; }
        .splash-dots { display: flex; gap: 8px; margin-top: 30px; }
        .splash-dots span { width: 10px; height: 10px; background: white; border-radius: 50%; animation: bounce 1s infinite; }
        .splash-dots span:nth-child(2) { animation-delay: 0.2s; }
        .splash-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-10px); } }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; transform: translateY(30px); transition: opacity 0.5s ease, transform 0.5s ease; }
        .modal-overlay.show { opacity: 1; transform: translateY(0); }
        .modal { background: white; border-radius: 20px; padding: 40px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .modal h2 { color: #1a6b3c; margin-bottom: 10px; font-size: 24px; }
        .modal p { color: #666; margin-bottom: 25px; font-size: 14px; }
        .modal input { width: 100%; padding: 12px 18px; border: 2px solid #e0e0e0; border-radius: 25px; font-size: 15px; margin-bottom: 15px; outline: none; transition: border 0.3s; }
        .modal input:focus { border-color: #1a6b3c; }
        .modal button { width: 100%; padding: 12px; background: linear-gradient(135deg, #1a6b3c, #2ecc71); color: white; border: none; border-radius: 25px; font-size: 16px; cursor: pointer; transition: transform 0.2s; }
        .modal button:hover { transform: scale(1.02); }
        .container { width: 100%; max-width: 700px; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; height: 90vh; display: flex; flex-direction: column; opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease, transform 0.5s ease; }
        .container.show { opacity: 1; transform: translateY(0); }
        .header { background: linear-gradient(135deg, #1a6b3c, #2ecc71); padding: 20px; display: flex; align-items: center; gap: 15px; }
        .avatar { width: 50px; height: 50px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .header-info h1 { color: white; font-size: 20px; }
        .header-info p { color: rgba(255,255,255,0.8); font-size: 13px; }
        .status { width: 10px; height: 10px; background: #00ff88; border-radius: 50%; display: inline-block; margin-right: 5px; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message-user { display: flex; justify-content: flex-end; }
        .message-user span { background: linear-gradient(135deg, #1a6b3c, #2ecc71); color: white; padding: 12px 18px; border-radius: 18px 18px 4px 18px; max-width: 70%; line-height: 1.5; }
        .message-ia { display: flex; justify-content: flex-start; gap: 10px; align-items: flex-end; }
        .message-ia span { background: #f0fff4; color: #333; padding: 12px 18px; border-radius: 18px 18px 18px 4px; max-width: 70%; line-height: 1.5; }
        .typing { display: none; padding: 0 20px 10px; align-items: center; gap: 10px; }
        .typing.active { display: flex; }
        .typing-dots { background: #f0fff4; padding: 12px 18px; border-radius: 18px; display: flex; gap: 5px; }
        .typing-dots span { width: 8px; height: 8px; background: #1a6b3c; border-radius: 50%; animation: bounce 1s infinite; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        .suggestions { padding: 10px 20px; display: flex; flex-wrap: wrap; gap: 8px; border-top: 1px solid #eee; }
        .suggestions button { background: #f0fff4; border: 1px solid #1a6b3c; color: #1a6b3c; padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .suggestions button:hover { background: #1a6b3c; color: white; }
        .input-zone { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        #message { flex: 1; padding: 12px 18px; border: 2px solid #e0e0e0; border-radius: 25px; font-size: 15px; outline: none; transition: border 0.3s; }
        #message:focus { border-color: #1a6b3c; }
        #envoyer { width: 50px; height: 50px; background: linear-gradient(135deg, #1a6b3c, #2ecc71); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
        #envoyer:hover { transform: scale(1.1); }
        #envoyer svg { width: 20px; height: 20px; fill: white; }
        #micro { width: 50px; height: 50px; background: #f0fff4; border: 2px solid #1a6b3c; border-radius: 50%; cursor: pointer; font-size: 20px; transition: all 0.2s; }
        #micro:hover { background: #1a6b3c; }
        .badge-demo { background: #ff6600; color: white; font-size: 11px; padding: 3px 10px; border-radius: 10px; margin-left: auto; }
    </style>
</head>
<body>
    <div id="splash">
        <div class="ia-rings">
            <div class="ring ring1"></div>
            <div class="ring ring2"></div>
            <div class="ia-robot">🤖</div>
        </div>
        <div class="splash-title">Assistant IA</div>
        <div class="splash-subtitle">Votre assistant virtuel intelligent</div>
        <div class="splash-dots"><span></span><span></span><span></span></div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2>🌿 Demo Chatbot IA</h2>
            <p>Entrez le nom de votre entreprise pour voir votre assistant personnalise en action !</p>
            <input type="text" id="nom-entreprise" placeholder="Ex: Camping Les Eychecadous..." />
            <input type="text" id="nom-contact" placeholder="Votre prenom" />
            <input type="email" id="email-contact" placeholder="Votre email" />
            <button onclick="demarrerDemo()">Voir ma demo personnalisee &#x2192;</button>
        </div>
    </div>

    <div class="container" id="chat-container">
        <div class="header">
            <div class="avatar">🤖</div>
            <div class="header-info">
                <h1 id="titre-assistant">Assistant IA</h1>
                <p><span class="status"></span>En ligne - Repond instantanement</p>
            </div>
            <span class="badge-demo">DEMO GRATUITE</span>
        </div>
        <div id="chat-box"></div>
        <div class="typing" id="typing">
            <div style="width:35px;height:35px;background:linear-gradient(135deg,#1a6b3c,#2ecc71);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;">🤖</div>
            <div class="typing-dots"><span></span><span></span><span></span></div>
        </div>
        <div class="suggestions">
            <button onclick="suggerer('Urgences et hopitaux proches')">🚑 Urgences</button>
            <button onclick="suggerer('Quelles randonnees faire dans le coin')">🥾 Randonnees</button>
            <button onclick="suggerer('Ou faire mes courses')">🛒 Commerces</button>
            <button onclick="suggerer('Quelle est la meteo')">🌦 Meteo</button>
            <button onclick="suggerer('Quels festivals en Ariege')">🎭 Festivals</button>
            <button onclick="suggerer('Ou trouver un veterinaire')">🐾 Veterinaire</button>
        </div>
        <div class="input-zone">
            <input type="text" id="message" placeholder="Ecrivez ou parlez..." />
            <button id="micro" onclick="demarrerMicro()" title="Parler">🎤</button>
            <button id="envoyer">
                <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
            </button>
        </div>
    </div>

    <script>
        var nomEntreprise = "";
        var historique = [];

        window.addEventListener("load", function() {
            setTimeout(function() {
                document.getElementById("splash").classList.add("hide");
                setTimeout(function() {
                    document.getElementById("splash").style.display = "none";
                    document.getElementById("modal").classList.add("show");
                }, 800);
            }, 2500);
        });

        function demarrerDemo() {
            var entreprise = document.getElementById("nom-entreprise").value.trim();
            var contact = document.getElementById("nom-contact").value.trim();
            var email = document.getElementById("email-contact").value.trim();
            if (!entreprise || !contact || !email) { alert("Merci de remplir tous les champs !"); return; }
            nomEntreprise = entreprise;
            document.getElementById("modal").style.display = "none";
            document.getElementById("titre-assistant").textContent = "Assistant " + entreprise;
            document.getElementById("chat-container").classList.add("show");
            ajouterMessage("Bonjour " + contact + " ! Comment puis-je vous aider ? / How can I help you?", "ia");
        }

        document.getElementById("envoyer").addEventListener("click", envoyer);
        document.getElementById("message").addEventListener("keypress", function(e) { if (e.key === "Enter") envoyer(); });

        function envoyer() {
            var input = document.getElementById("message");
            var texte = input.value.trim();
            if (!texte) return;
            ajouterMessage(texte, "user");
            input.value = "";
            document.getElementById("typing").classList.add("active");
            fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: texte, entreprise: nomEntreprise, historique: historique })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                document.getElementById("typing").classList.remove("active");
                historique = data.historique;
                ajouterMessage(data.reponse, "ia");
            });
        }

        function suggerer(texte) {
            document.getElementById("message").value = texte;
            envoyer();
        }

        function demarrerMicro() {
            var recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = "fr-FR";
            recognition.start();
            document.getElementById("micro").textContent = "🔴";
            recognition.onresult = function(event) {
                document.getElementById("message").value = event.results[0][0].transcript;
                document.getElementById("micro").textContent = "🎤";
                envoyer();
            };
            recognition.onerror = function() { document.getElementById("micro").textContent = "🎤"; };
        }

        function ajouterMessage(texte, qui) {
            var box = document.getElementById("chat-box");
            var div = document.createElement("div");
            div.className = "message-" + qui;
            if (qui === "ia") {
                div.innerHTML = "<div style='width:35px;height:35px;background:linear-gradient(135deg,#1a6b3c,#2ecc71);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;'>🤖</div><span>" + texte + "</span>";
            } else {
                div.innerHTML = "<span>" + texte + "</span>";
            }
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
